name: CI — Lint, Type-check & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Frontend (type-check, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-LGBTQIA+
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project-LGBTQIA+/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx vite build
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder
          VITE_FIREBASE_MESSAGING_SENDER_ID: ci-placeholder
          VITE_FIREBASE_APP_ID: ci-placeholder
