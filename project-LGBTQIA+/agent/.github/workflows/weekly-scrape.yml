name: Event Scraper Agent

on:
  # Executa toda segunda-feira às 8h (horário de Brasília)
  schedule:
    - cron: '0 11 * * 1'  # 11:00 UTC = 8:00 BRT

  # Permite execução manual
  workflow_dispatch:
    inputs:
      city:
        description: 'Cidade foco'
        required: false
        default: 'Fortaleza'
      limit:
        description: 'Limite de eventos'
        required: false
        default: '10'

jobs:
  scrape-and-publish:
    name: Buscar e Publicar Eventos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Instalar dependências
        working-directory: agent
        run: npm ci

      - name: Configurar Firebase
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          cat > agent/.env << EOF
          FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID
          FIREBASE_CLIENT_EMAIL=$FIREBASE_CLIENT_EMAIL
          FIREBASE_PRIVATE_KEY=$FIREBASE_PRIVATE_KEY
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF

      - name: Executar Agente de Eventos
        working-directory: agent
        run: npm run start

      - name: Reportar sucesso
        if: success()
        run: |
          echo "✅ Agente executado com sucesso!"
          echo "📅 Data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "🎯 Cidade: ${{ github.event.inputs.city || 'Fortaleza' }}"
          echo "📊 Limite: ${{ github.event.inputs.limit || 10 }}"

      - name: Reportar falha
        if: failure()
        run: |
          echo "❌ Agente falhou!"
          echo "📅 Data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "🔍 Verifique os logs acima para mais detalhes"

  # Job separado para scraping frequente (a cada 3 dias)
  frequent-scrape:
    name: Scraping Frequente (Teste)
    runs-on: ubuntu-latest
    # Por padrão, desabilitado - ativar se necessário
    # schedule:
    #   - cron: '0 */3 * * *'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        working-directory: agent
        run: npm ci

      - name: Setup Firebase
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          cat > agent/.env << EOF
          FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID
          FIREBASE_CLIENT_EMAIL=$FIREBASE_CLIENT_EMAIL
          FIREBASE_PRIVATE_KEY=$FIREBASE_PRIVATE_KEY
          EOF

      - name: Executar Scraping
        working-directory: agent
        run: npm run scrape
